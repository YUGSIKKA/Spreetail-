databases:
  - name: shared-expenses-db
    databaseName: shared_expenses
    user: postgres
    plan: free

services:
  - type: web
    name: shared-expenses-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shared-expenses-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://shared-expenses-frontend.vercel.app
